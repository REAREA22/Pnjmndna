<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DANA Pinjaman</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HERO -->
<section class="hero">
  <img src="assets/poster.png" alt="Poster">
</section>

<!-- BAGIAN PILIH SESUAI KEBUTUHAN -->
<div class="banner-kebutuhan">
    <img src="images/banner-kebutuhan.png" alt="Banner Kebutuhan">
</div>

<!-- MENU IMAGE -->
<section class="menu-img">

  <a href="#" class="img-card">
    <img src="assets/ajukan.png">
  </a>

  <a href="#" class="img-card">
    <img src="assets/cicil.png">
  </a>

  <a href="#" class="img-card">
    <img src="assets/lapor.png">
  </a>

</section>

<section class="legal">

  <h3>DANA Terdaftar dan Diawasi Oleh :</h3>

  <div class="legal-logos">
    <img src="assets/ojk.png" alt="OJK">
    <img src="assets/lazada.png" alt="Lazada">
  </div>

  <p class="legal-desc">
    Data Anda dijamin aman sesuai standar keamanan DANA
  </p>

</section>



<script>
document.querySelectorAll('.img-card').forEach(el => {
  el.addEventListener('click', function(){
    this.classList.add('click');
    setTimeout(() => this.classList.remove('click'), 150);
  });
</script>

</body>
</html>
