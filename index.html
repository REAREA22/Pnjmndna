<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DANA Pinjaman</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HERO -->
<section class="hero">
  <img src="assets/poster.png" alt="Poster">
</section>

<!-- INFO -->
<section class="info">
  <div class="info-item">
    <img src="assets/icon-pengajuan.png">
    <p>100% Online</p>
  </div>
  <div class="info-item">
    <img src="assets/icon-proses.png">
    <p>Proses Cepat</p>
  </div>
  <div class="info-item">
    <img src="assets/icon-cair.png">
    <p>Langsung Cair</p>
  </div>
</section>

<!-- SECTION TITLE -->
<section class="section-title">
  <h2>PILIH SESUAI KEBUTUHAN ANDA</h2>
  <p>Akses layanan DANA dengan mudah dan aman</p>
</section>

<!-- MENU IMAGE -->
<section class="menu-img">

  <a href="#" class="img-card">
    <img src="assets/ajukan.png">
  </a>

  <a href="#" class="img-card">
    <img src="assets/cicil.png">
  </a>

  <a href="#" class="img-card">
    <img src="assets/lapor.png">
  </a>

</section>

<!-- CTA -->
<section class="cta">
  <button>AJUKAN PINJAMAN SEKARANG</button>
</section>

<section class="legal">

  <h3>DANA Terdaftar dan Diawasi Oleh :</h3>

  <div class="legal-logos">
    <img src="assets/ojk.png" alt="OJK">
    <img src="assets/lazada.png" alt="Lazada">
  </div>

  <p class="legal-desc">
    Data Anda dijamin aman sesuai standar keamanan DANA
  </p>

</section>

<script>
document.querySelectorAll('.img-card').forEach(el => {
  el.addEventListener('click', function(){
    this.classList.add('click');
    setTimeout(() => this.classList.remove('click'), 150);
  });
});
</script>

</body>
</html>
